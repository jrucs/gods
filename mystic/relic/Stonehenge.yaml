    - The rudeness of the work increases this cause of grandeur, as it excludes the idea of art and contrivance; for dexterity produces another sort of effect, which is different enough from this. -Edmund Burke
    prompt:
    - Use a 9:16 aspect ratio for the output image
    - The card should have a black border.
    - The card should fill the remainder of the space.
    - There should be a space for an image.
    - There should be a box for text.
