card:
  name: Italo Calvino
  type: Disciple
  cost: 0
  combat: 0/2
  text:
    - Tap to produce M.
    - "Cosimo sat in the ash tree every day, gazing at the meadow as if he could read in it something that had long been consuming him inside: the very idea of distance, of the gap that can't be bridged, of the wait that can last longer than life. -Baron in the Trees"
  prompt:
    - Use a 9:16 aspect ratio for the output image
    - The card should have a black border.
    - The card should fill the remainder of the space.
    - There should be a space for an image.
    - There should be a box for text.
    - The name goes in the upper left.
    - The cost goes in the lower left.
    - The type goes in the bottom right followed by a dash and the combat.
    - The background of the card should be blue and green.
    - The image should be of the Italo Calvino.
    - The image and card in general should be in the style of Grateful Dead album covers, with vibrant colors and a whimsical, psychedelic feel. Use the refence card as a guide.
